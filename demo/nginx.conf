server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /fhir/ {
        proxy_pass http://hapi:8080/fhir/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location /matchbox/fhir/ {
        proxy_pass http://matchbox:8080/matchboxv3/fhir/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }
}
