services:
  hapi:
    image: hapiproject/hapi:latest
    container_name: okrx-hapi
    restart: on-failure
    ports:
      - "8090:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: "file:///app/config/application.yaml"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://db:5432/hapi"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "admin"
      SPRING_DATASOURCE_DRIVERCLASSNAME: "org.postgresql.Driver"
      HIBERNATE_DIALECT: "ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect"
      HAPI_FHIR_CR_ENABLED: "true"
    volumes:
      - ./config/application.yaml:/app/config/application.yaml:ro
    depends_on:
      db:
        condition: service_healthy

  demo:
    image: nginx:alpine
    container_name: okrx-hapi-demo
    ports:
      - "8091:80"
    volumes:
      - ./demo:/usr/share/nginx/html:ro
      - ./demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - hapi

  db:
    image: postgres:15-alpine
    container_name: okrx-hapi-postgres
    restart: always
    environment:
      POSTGRES_DB: hapi
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d hapi"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    volumes:
      - hapi-postgres-data:/var/lib/postgresql/data

volumes:
  hapi-postgres-data:
